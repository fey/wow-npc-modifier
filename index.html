<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPC Modifier</title>
</head>

<body>
  <div class="layout">

    <section>
      <h2>Инструкция</h2>
      <ol>
        <li>Перейти на <a href="https://www.wowhead.com/" target="_blank">WoWHead</a> и найти страницу NPC</li>
        <li>Скопировать ID из адресной строки</li>
        <li>Выбрать уровень, класс, моба, желаемое HP</li>
        <li>Нажать "Submit"</li>
        <li>Скопировать SQL запрос</li>
      </ol>
    </section>

    <form id="mod-form">
      <label>
        Entry
        <input required type="number" name="entryId" id="entry">
      </label>

      <label>
        Level
        <input required type="number" name="level" id="level" min="1" max="75">
      </label>

      <label>
        Class
        <select required name="classNumber" id="class">
          <option value="1">Warrior</option>
          <option value="2">Paladin</option>
          <option value="8">Mage</option>
        </select>
      </label>
      <label>
        Desired HP
        <input type="number" name="targetHealth">
      </label>
      <div class="buttons">
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
      </div>
    </form>
    <div class="output">
      <button id="copyButton" class="copy-button">Copy</button>
      <pre><code id="output"></pre>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
